name: Refresh Google Trends data

on:
  # Scheduled refresh is disabled to preserve SerpApi free-tier quota
  # (100 searches/month; daily would use ~480). Re-enable by uncommenting
  # the schedule block below once on a paid SerpApi plan.
  # schedule:
  #   - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fetch dependencies
        run: pip install -r requirements-fetch.txt

      - name: Fetch trends
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/fetch_trends.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trends.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh trends snapshot"
            git push
          fi
